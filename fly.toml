app = 'prello'
primary_region = 'sjc'

[build]

[env]
  PORT = '3654'

[http_service]
  internal_port = 3654
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[mounts]
  source = 'prello_data'
  destination = '/app/data'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
