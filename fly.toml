# fly.toml app configuration file generated for prello on 2026-04-02T10:57:33-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'prello'
primary_region = 'sjc'

[build]

[env]
  PORT = '3654'

[mounts]
  source = 'prello_data'
  destination = '/app/data'

[http_service]
  internal_port = 3654
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
